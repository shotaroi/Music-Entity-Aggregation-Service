spring:
  application:
    name: entity-page-api
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

kafka:
  topics:
    page-events: page-events
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8080

services:
  catalog:
    url: http://localhost:8081
  popularity:
    url: http://localhost:8082

# Resilience4j: timeouts 80ms, circuit breakers, limited retries
resilience4j:
  timelimiter:
    configs:
      default:
        timeoutDuration: 80ms
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      catalog:
        baseConfig: default
      popularity:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 2
        waitDuration: 50ms
    instances:
      catalog:
        baseConfig: default
      popularity:
        baseConfig: default

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
